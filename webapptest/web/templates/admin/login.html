<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Plashka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#e2eaf4', secondary: '#334155', accent: '#0ea5e9' }
                }
            }
        }
    </script>
    <style>
        .btn-accent { background: #0ea5e9; transition: background 0.15s; }
        .btn-accent:hover { background: #38bdf8; }
    </style>
</head>
<body style="background: #070f1a;" class="flex items-center justify-center min-h-screen font-sans antialiased selection:bg-accent selection:text-white">

    <div class="w-full max-w-md px-6 py-12">
        <div class="sm:mx-auto sm:w-full sm:max-w-md flex flex-col items-center mb-8">
            <div class="flex items-center justify-center mb-4">
                <svg width="56" height="56" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="32" height="32" rx="8" fill="url(#login-grad)"/>
                    <defs>
                        <linearGradient id="login-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#0ea5e9"/>
                            <stop offset="100%" stop-color="#2563eb"/>
                        </linearGradient>
                    </defs>
                    <text x="8" y="23" font-family="Inter,sans-serif" font-weight="700" font-size="18" fill="white">P</text>
                </svg>
            </div>
            <h2 class="text-center text-2xl font-bold leading-9 tracking-tight text-primary">
                Вход в панель
            </h2>
            <p class="mt-2 text-center text-sm" style="color: #6b8cae;">
                Введите учетные данные администратора
            </p>
        </div>

        <div style="background: #0d1b2e; border-color: #1e3a5f;" class="px-8 py-10 shadow-sm border rounded-2xl sm:px-10">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-6 rounded-lg p-4 border {% if category in ('error', 'danger') %}border-red-700 text-red-300" style="background: rgba(220,38,38,0.12){% else %}border-blue-700 text-blue-300" style="background: rgba(14,165,233,0.12){% endif %}">
                            <p class="text-sm font-medium">{{ message }}</p>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="space-y-6" action="" method="POST">
                
                <div>
                    <label for="username" class="block text-sm font-medium leading-6" style="color: #e2eaf4;">Имя пользователя</label>
                    <div class="mt-2">
                        <input id="username" name="username" type="text" autocomplete="username" required 
                            style="background: #112240; border-color: #1e3a5f; color: #e2eaf4;"
                            class="block w-full rounded-lg border py-2.5 px-3.5 shadow-sm placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-accent sm:text-sm sm:leading-6 transition-colors"
                            placeholder="admin">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium leading-6" style="color: #e2eaf4;">Пароль</label>
                    <div class="mt-2 relative">
                        <input id="password" name="password" type="password" autocomplete="current-password" required 
                            style="background: #112240; border-color: #1e3a5f; color: #e2eaf4;"
                            class="block w-full rounded-lg border py-2.5 px-3.5 shadow-sm placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-accent sm:text-sm sm:leading-6 transition-colors"
                            placeholder="••••••••">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between">
                        <label for="otp" class="block text-sm font-medium leading-6" style="color: #e2eaf4;">Код 2FA <span style="color: #6b8cae;" class="font-normal">(если включен)</span></label>
                    </div>
                    <div class="mt-2">
                        <input id="otp" name="otp" type="text" inputmode="numeric" autocomplete="one-time-code" 
                            style="background: #112240; border-color: #1e3a5f; color: #e2eaf4;"
                            class="block w-full rounded-lg border py-2.5 px-3.5 shadow-sm placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-accent sm:text-sm sm:leading-6 transition-colors tracking-widest font-mono"
                            placeholder="123456">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" 
                        class="btn-accent flex w-full justify-center rounded-lg px-3 py-3 text-sm font-semibold leading-6 text-white shadow-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 transition-all active:scale-[0.98]">
                        Войти в систему
                    </button>
                </div>
            </form>
        </div>
        
        <p class="text-center text-xs mt-8" style="color: #6b8cae;">
            Защищено системой логирования IP-адресов.
        </p>
    </div>

</body>
</html>
