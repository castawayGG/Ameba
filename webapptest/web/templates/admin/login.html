<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Plashka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#e6edf3', secondary: '#334155', accent: '#3b82f6' }
                }
            }
        }
    </script>
    <style>
        .btn-accent { background: #3b82f6; transition: background 0.15s; }
        .btn-accent:hover { background: #60a5fa; }
        input:focus { outline: none; ring: none; border-color: #3b82f6 !important; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    </style>
</head>
<body style="background: #0d1117;" class="flex items-center justify-center min-h-screen font-sans antialiased">

    <div class="w-full max-w-md px-6 py-12">
        <div class="flex flex-col items-center mb-8">
            <div class="flex items-center justify-center w-12 h-12 rounded-xl mb-5" style="background: linear-gradient(135deg, #3b82f6, #06b6d4);">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            </div>
            <h2 class="text-center text-2xl font-bold leading-9 tracking-tight" style="color: #e6edf3;">
                Вход в панель
            </h2>
            <p class="mt-2 text-center text-sm" style="color: #8b949e;">
                Введите учётные данные администратора
            </p>
        </div>

        <div style="background: #161b22; border: 1px solid #21304a;" class="px-8 py-8 rounded-2xl shadow-xl">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-6 rounded-lg p-3.5 border {% if category in ('error', 'danger') %}border-red-700/60 text-red-300" style="background: rgba(220,38,38,0.1){% else %}border-blue-700/60 text-blue-300" style="background: rgba(59,130,246,0.1){% endif %}">
                            <p class="text-sm font-medium">{{ message }}</p>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="space-y-5" action="" method="POST">
                
                <div>
                    <label for="username" class="block text-sm font-medium mb-2" style="color: #c9d1d9;">Имя пользователя</label>
                    <input id="username" name="username" type="text" autocomplete="username" required 
                        style="background: #0d1117; border: 1px solid #21304a; color: #e6edf3;"
                        class="block w-full rounded-lg py-2.5 px-3.5 text-sm transition-colors placeholder:text-gray-600"
                        placeholder="admin">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium mb-2" style="color: #c9d1d9;">Пароль</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required 
                        style="background: #0d1117; border: 1px solid #21304a; color: #e6edf3;"
                        class="block w-full rounded-lg py-2.5 px-3.5 text-sm transition-colors placeholder:text-gray-600"
                        placeholder="••••••••">
                </div>

                <div>
                    <label for="otp" class="block text-sm font-medium mb-2" style="color: #c9d1d9;">
                        Код 2FA <span style="color: #8b949e;" class="font-normal">(если включён)</span>
                    </label>
                    <input id="otp" name="otp" type="text" inputmode="numeric" autocomplete="one-time-code" 
                        style="background: #0d1117; border: 1px solid #21304a; color: #e6edf3;"
                        class="block w-full rounded-lg py-2.5 px-3.5 text-sm transition-colors tracking-widest font-mono placeholder:text-gray-600 placeholder:tracking-normal"
                        placeholder="123456">
                </div>

                <div class="pt-1">
                    <button type="submit" 
                        class="btn-accent flex w-full justify-center rounded-lg px-3 py-2.5 text-sm font-semibold text-white shadow-sm transition-all active:scale-[0.98] mt-1">
                        Войти в систему
                    </button>
                </div>
            </form>
        </div>
        
        <p class="text-center text-xs mt-6" style="color: #6e7681;">
            Защищено системой логирования IP-адресов.
        </p>
    </div>

</body>
</html>
