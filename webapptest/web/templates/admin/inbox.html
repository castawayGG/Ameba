{% extends 'admin/base.html' %}
{% block title %}Входящие{% endblock %}
{% block page_title %}Входящие сообщения{% endblock %}

{% block content %}
<style>
.dialog-item:hover { background: var(--panel-card); }
</style>
<div class="flex h-full gap-3" style="height: calc(100vh - 200px);">
    <!-- Left panel: dialogs list -->
    <div class="w-64 flex flex-col rounded-xl border overflow-hidden flex-shrink-0" style="background: var(--panel-surface); border-color: var(--panel-border);">
        <div class="p-3 border-b flex-shrink-0" style="border-color: var(--panel-border);">
            <select id="inbox-account" onchange="loadInbox()" class="w-full text-sm rounded-lg px-3 py-2 border" style="background: var(--panel-card); border-color: var(--panel-border); color: var(--panel-text);">
                <option value="">Все аккаунты</option>
                {% for acc in accounts %}
                <option value="{{ acc.id }}">{{ acc.phone }}</option>
                {% endfor %}
            </select>
            <div class="flex items-center gap-2 mt-2">
                <button id="btn-unread-only" onclick="toggleInboxUnread()" class="flex-1 text-xs py-1.5 rounded-lg border transition-colors" style="background: var(--panel-card); border-color: var(--panel-border); color: var(--panel-muted);">
                    Непрочитанные
                </button>
                <button id="btn-contacts-only" onclick="toggleContactsOnly()" class="flex-1 text-xs py-1.5 rounded-lg border transition-colors" title="Только контакты" style="background: var(--panel-card); border-color: var(--panel-border); color: var(--panel-muted);">
                    Контакты
                </button>
                <span id="unread-badge" class="text-xs font-bold px-2 py-0.5 rounded-full bg-red-500/20 text-red-400 hidden">0</span>
            </div>
            <div class="mt-2 text-xs" style="color: var(--panel-muted);">
                <i data-lucide="layout-columns" class="w-3 h-3 inline mr-1"></i>Кликните на диалог для открытия (до 3 колонок)
            </div>
        </div>
        <div id="dialogs-list" class="flex-1 overflow-y-auto divide-y" style="border-color: var(--panel-border);">
            <div class="p-4 text-center text-sm" style="color: var(--panel-muted);">Загрузка...</div>
        </div>
    </div>

    <!-- Chat columns container (Split-View, up to 3 columns) -->
    <div id="chat-columns" class="flex-1 flex gap-3 min-w-0">
        <!-- Columns are dynamically inserted here -->
        <div class="flex-1 flex items-center justify-center rounded-xl border" style="background: var(--panel-surface); border-color: var(--panel-border);">
            <p class="text-sm" style="color: var(--panel-muted);">Выберите диалог слева</p>
        </div>
    </div>
</div>

<!-- Handover modal -->
<div id="handoverModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background: rgba(0,0,0,0.7);">
    <div class="w-full max-w-sm rounded-2xl border p-6" style="background: var(--panel-card); border-color: var(--panel-border);">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-base font-semibold" style="color: var(--panel-text);">
                <i data-lucide="user-check" class="w-4 h-4 mr-2 inline" style="color: var(--panel-accent);"></i>Передать чат
            </h3>
            <button onclick="closeHandoverModal()" style="color: var(--panel-muted);"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="mb-4">
            <label class="block text-xs font-medium mb-1.5" style="color: var(--panel-muted);">Оператор</label>
            <select id="handover-user-select" class="w-full text-sm rounded-lg px-3 py-2.5 border outline-none" style="background: var(--panel-surface); border-color: var(--panel-border); color: var(--panel-text);">
                {% for u in users %}
                <option value="{{ u.id }}">{{ u.username }} ({{ u.role }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex gap-3">
            <button onclick="confirmHandover()" class="flex-1 py-2 text-sm rounded-lg font-medium btn-accent-glow text-white">Передать</button>
            <button onclick="closeHandoverModal()" class="flex-1 py-2 text-sm rounded-lg border" style="border-color: var(--panel-border); color: var(--panel-muted);">Отмена</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let inboxUnreadOnly = false;
let inboxContactsOnly = false;
// Split-view state: array of {accountId, senderId, name, chatId}
const MAX_COLUMNS = 3;
let chatColumns = []; // [{accountId, senderId, name, chatId}]

// Handover state
let handoverAccountId = null;
let handoverChatId = null;

function relativeTime(isoStr) {
    if (!isoStr) return '';
    // Avoid double-appending timezone suffix if already present
    const normalized = /Z$|[+-]\d{2}:\d{2}$/.test(isoStr) ? isoStr : isoStr + 'Z';
    const diff = Math.floor((Date.now() - new Date(normalized).getTime()) / 1000);
    if (diff < 0) return 'только что';
    if (diff < 60) return `${diff}с`;
    if (diff < 3600) return `${Math.floor(diff/60)}м`;
    if (diff < 86400) return `${Math.floor(diff/3600)}ч`;
    return `${Math.floor(diff/86400)}д`;
}

async function loadInbox() {
    const accId = document.getElementById('inbox-account').value;
    const params = new URLSearchParams({page: 1, limit: 100});
    if (accId) params.set('account_id', accId);
    if (inboxUnreadOnly) params.set('is_read', '0');
    const r = await fetch('/admin/api/inbox?' + params);
    const d = await r.json();
    if (!d.success) return;

    // Group by sender; contacts-only filter keeps only messages with a known sender_name or sender_username
    const byKey = {};
    d.messages.forEach(m => {
        if (inboxContactsOnly && !m.sender_name && !m.sender_username) return;
        const key = `${m.account_id}:${m.sender_tg_id || m.chat_id}`;
        if (!byKey[key] || new Date(m.created_at) > new Date(byKey[key].created_at)) byKey[key] = m;
    });

    const list = document.getElementById('dialogs-list');
    const items = Object.values(byKey).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    if (!items.length) { list.innerHTML = '<div class="p-4 text-center text-sm" style="color: var(--panel-muted);">Нет сообщений</div>'; return; }
    list.innerHTML = items.map(m => {
        const name = m.sender_name || m.sender_username || m.chat_title || m.chat_id;
        const assigned = m.assigned_to ? `<span class="text-xs" style="color:var(--panel-accent);">→ передан</span>` : '';
        return `
        <div onclick="openChat('${m.account_id}','${(m.sender_tg_id||m.chat_id)}','${name.replace(/'/g,"\\'")}','${m.chat_id}')"
             class="p-3 cursor-pointer transition-colors dialog-item ${!m.is_read ? 'border-l-2' : ''}"
             style="${!m.is_read ? 'border-left-color: var(--panel-accent);' : ''}">
            <div class="flex items-center justify-between">
                <span class="text-sm font-medium truncate" style="color: var(--panel-text);">${name}</span>
                <span class="text-xs flex-shrink-0 ml-2" style="color: var(--panel-muted);">${relativeTime(m.created_at)}</span>
            </div>
            <p class="text-xs truncate mt-0.5" style="color: var(--panel-muted);">${m.text || '[медиа]'}</p>
            <div class="flex items-center justify-between mt-0.5">
                <p class="text-xs" style="color: var(--panel-accent);">${m.account_id}</p>
                ${assigned}
            </div>
        </div>`;
    }).join('');
}

function openChat(accountId, senderId, name, chatId) {
    // Check if already open
    const existing = chatColumns.findIndex(c => c.accountId === accountId && c.chatId === chatId);
    if (existing >= 0) {
        // Just scroll to it
        document.getElementById(`chat-col-${existing}`)?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'});
        return;
    }
    // Add to columns (max 3, push oldest out)
    if (chatColumns.length >= MAX_COLUMNS) chatColumns.shift();
    chatColumns.push({accountId, senderId, name, chatId});
    renderChatColumns();
    // Load messages for the new column
    const idx = chatColumns.length - 1;
    loadColumnMessages(idx);
}

function renderChatColumns() {
    const container = document.getElementById('chat-columns');
    if (!chatColumns.length) {
        container.innerHTML = '<div class="flex-1 flex items-center justify-center rounded-xl border" style="background: var(--panel-surface); border-color: var(--panel-border);"><p class="text-sm" style="color: var(--panel-muted);">Выберите диалог слева</p></div>';
        return;
    }
    container.innerHTML = chatColumns.map((col, idx) => `
        <div id="chat-col-${idx}" class="flex-1 flex flex-col rounded-xl border overflow-hidden min-w-0" style="background: var(--panel-surface); border-color: var(--panel-border);">
            <div class="p-3 border-b flex-shrink-0 flex items-center justify-between" style="border-color: var(--panel-border);">
                <div class="flex items-center gap-2 min-w-0">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs flex-shrink-0" style="background: linear-gradient(135deg, #0ea5e9, #2563eb);">
                        ${(col.name||'?')[0].toUpperCase()}
                    </div>
                    <div class="min-w-0">
                        <p class="text-sm font-semibold truncate" style="color: var(--panel-text);">${col.name || 'Unknown'}</p>
                        <p class="text-xs truncate" style="color: var(--panel-muted);">${col.accountId}</p>
                    </div>
                </div>
                <div class="flex items-center gap-1 flex-shrink-0">
                    <button onclick="openHandoverModal('${col.accountId}','${col.chatId}')" class="p-1 rounded transition-colors" style="color: var(--panel-muted);" title="Передать оператору">
                        <i data-lucide="user-check" class="w-4 h-4"></i>
                    </button>
                    <button onclick="closeColumn(${idx})" class="p-1 rounded transition-colors" style="color: var(--panel-muted);" title="Закрыть">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div id="chat-messages-${idx}" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2">
                <div class="text-center text-sm my-auto" style="color: var(--panel-muted);">Загрузка...</div>
            </div>
            <div class="p-2 border-t flex-shrink-0" style="border-color: var(--panel-border);">
                <div class="flex gap-2">
                    <button onclick="toggleQuickReplies(${idx})" class="p-2 rounded-lg transition-colors flex-shrink-0" style="color: var(--panel-muted);" title="Быстрые ответы">
                        <i data-lucide="message-square-reply" class="w-4 h-4"></i>
                    </button>
                    <input id="chat-input-${idx}" type="text" placeholder="Сообщение..." class="flex-1 text-sm rounded-lg px-3 py-2 border outline-none" style="background: var(--panel-card); border-color: var(--panel-border); color: var(--panel-text);" onkeydown="if(event.key==='Enter') sendChatMsg(${idx})">
                    <button onclick="sendChatMsg(${idx})" class="px-3 py-2 text-sm rounded-lg font-medium btn-accent-glow text-white flex-shrink-0">
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </div>
                <div id="qr-panel-${idx}" class="hidden mt-2 rounded-lg border p-2 max-h-32 overflow-y-auto" style="background: var(--panel-surface); border-color: var(--panel-border);">
                    <div class="text-xs mb-1.5 font-medium" style="color: var(--panel-muted);">Быстрые ответы</div>
                    <div id="qr-list-${idx}" class="space-y-1"></div>
                </div>
            </div>
        </div>
    `).join('');
    if (window.lucide) lucide.createIcons();
}

function closeColumn(idx) {
    chatColumns.splice(idx, 1);
    renderChatColumns();
}

async function loadColumnMessages(idx) {
    const col = chatColumns[idx];
    if (!col) return;
    const r = await fetch(`/admin/api/inbox?account_id=${col.accountId}&is_read=&limit=100`);
    const d = await r.json();
    const msgs = (d.messages || []).filter(m => m.chat_id == col.chatId || m.sender_tg_id == col.senderId);
    const container = document.getElementById(`chat-messages-${idx}`);
    if (!container) return;
    if (!msgs.length) { container.innerHTML = '<div class="text-center text-sm my-auto" style="color: var(--panel-muted);">Нет сообщений</div>'; return; }
    const isPhoto = mt => mt && (mt.toLowerCase().includes('photo') || mt.toLowerCase().includes('image'));
    container.innerHTML = msgs.map(m => {
        let body = '';
        if (isPhoto(m.media_type) && m.tg_message_id) {
            body = `<img src="/admin/accounts/${m.account_id}/media/${m.tg_message_id}" alt="фото"
                        class="max-w-full rounded-xl mb-1 cursor-pointer"
                        style="max-height:200px;object-fit:cover;"
                        onclick="window.open(this.src,'_blank')"
                        onerror="this.style.display='none'">`;
            if (m.text) body += `<div>${m.text}</div>`;
        } else if (m.media_type && !m.text) {
            const icon = m.media_type.toLowerCase().includes('document') ? '📎' :
                         m.media_type.toLowerCase().includes('video') ? '🎥' :
                         m.media_type.toLowerCase().includes('audio') ? '🎵' : '📁';
            body = `<span class="opacity-70">${icon} [${m.media_type}]</span>`;
        } else {
            body = m.text || '';
        }
        return `
        <div class="flex ${m.is_outgoing ? 'justify-end' : 'justify-start'}">
            <div class="max-w-[85%] px-3 py-2 rounded-2xl text-xs ${m.is_outgoing ? 'rounded-br-sm' : 'rounded-bl-sm'}"
                 style="background: ${m.is_outgoing ? 'var(--panel-accent)' : 'var(--panel-card)'}; color: ${m.is_outgoing ? '#fff' : 'var(--panel-text)'};">
                ${body}
                <div class="text-xs mt-1 opacity-60">${relativeTime(m.created_at)}</div>
            </div>
        </div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
    // Mark read
    msgs.filter(m => !m.is_read).forEach(m => fetch(`/admin/api/inbox/${m.id}/mark_read`, {method: 'POST'}));
}

async function sendChatMsg(idx) {
    const col = chatColumns[idx];
    if (!col) return;
    const input = document.getElementById(`chat-input-${idx}`);
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    const r = await fetch(`/admin/accounts/${col.accountId}/chat/${col.chatId}/send`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text})
    });
    const d = await r.json();
    if (d.success) { showToast('Отправлено', 'success'); loadColumnMessages(idx); }
    else showToast(d.error || 'Ошибка', 'error');
}

function openHandoverModal(accountId, chatId) {
    handoverAccountId = accountId;
    handoverChatId = chatId;
    document.getElementById('handoverModal').classList.remove('hidden');
}

function closeHandoverModal() {
    document.getElementById('handoverModal').classList.add('hidden');
    handoverAccountId = null;
    handoverChatId = null;
}

async function confirmHandover() {
    const assigneeId = document.getElementById('handover-user-select').value;
    if (!handoverAccountId || !handoverChatId || !assigneeId) return;
    const r = await fetch('/admin/api/inbox/assign_chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({account_id: handoverAccountId, chat_id: handoverChatId, assignee_id: parseInt(assigneeId)})
    });
    const d = await r.json();
    if (d.success) { showToast('Чат передан оператору', 'success'); closeHandoverModal(); loadInbox(); }
    else showToast(d.error || 'Ошибка', 'error');
}

function toggleInboxUnread() {
    inboxUnreadOnly = !inboxUnreadOnly;
    const btn = document.getElementById('btn-unread-only');
    btn.style.color = inboxUnreadOnly ? 'var(--panel-accent)' : 'var(--panel-muted)';
    loadInbox();
}

function toggleContactsOnly() {
    inboxContactsOnly = !inboxContactsOnly;
    const btn = document.getElementById('btn-contacts-only');
    btn.style.color = inboxContactsOnly ? 'var(--panel-accent)' : 'var(--panel-muted)';
    loadInbox();
}

async function loadUnreadCount() {
    const r = await fetch('/admin/api/inbox/unread_count');
    const d = await r.json();
    const badge = document.getElementById('unread-badge');
    if (d.count > 0) { badge.textContent = d.count; badge.classList.remove('hidden'); }
    else badge.classList.add('hidden');
}

// Refresh open chat columns when new inbox messages arrive
function refreshOpenColumns() {
    chatColumns.forEach((_, idx) => loadColumnMessages(idx));
}

loadInbox();
loadUnreadCount();
setInterval(() => { loadInbox(); loadUnreadCount(); refreshOpenColumns(); }, 15000);

// WebSocket integration: update inbox in real time when new messages arrive
(function connectInboxWS() {
    try {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${proto}://${location.host}/ws/notifications`);
        ws.onmessage = function(e) {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'inbox_count') {
                    const badge = document.getElementById('unread-badge');
                    if (msg.count > 0) { badge.textContent = msg.count; badge.classList.remove('hidden'); }
                    else badge.classList.add('hidden');
                    // Also refresh dialog list and open columns
                    loadInbox();
                    refreshOpenColumns();
                }
            } catch (_) {}
        };
        ws.onclose = function() { setTimeout(connectInboxWS, 5000); };
        ws.onerror = function(e) { console.log('[inbox ws] connection error, retrying in 5s', e); ws.close(); };
    } catch(_) {}
})();

// Quick Replies in inbox
let quickRepliesCache = null;
async function fetchQuickReplies() {
    if (quickRepliesCache) return quickRepliesCache;
    const r = await fetch('/admin/api/quick-replies');
    const d = await r.json();
    quickRepliesCache = d.success ? (d.items || []) : [];
    return quickRepliesCache;
}

async function toggleQuickReplies(idx) {
    const panel = document.getElementById(`qr-panel-${idx}`);
    const list  = document.getElementById(`qr-list-${idx}`);
    if (panel.classList.contains('hidden')) {
        panel.classList.remove('hidden');
        const items = await fetchQuickReplies();
        if (!items.length) {
            list.innerHTML = '<div class="text-xs py-1" style="color:var(--panel-muted);">Нет шаблонов. <a href="/admin/quick-replies" class="underline" style="color:var(--panel-accent);">Создать</a></div>';
        } else {
            list.innerHTML = items.map((item, i) => `
                <button data-qr-idx="${idx}" data-qr-content="${item.content.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}"
                        class="qr-btn w-full text-left px-2 py-1 rounded text-xs hover:bg-white/5 transition-colors truncate"
                        style="color:var(--panel-text);" title="${item.title.replace(/"/g,'&quot;')}">
                    ${item.shortcut ? `<span style="color:var(--panel-accent);" class="mr-1 font-mono">${item.shortcut.replace(/</g,'&lt;')}</span>` : ''}${item.title.replace(/</g,'&lt;')}
                </button>`).join('');
            list.querySelectorAll('.qr-btn').forEach(btn => {
                btn.addEventListener('click', () => useQuickReply(parseInt(btn.dataset.qrIdx), btn.dataset.qrContent));
            });
        }
        if (window.lucide) lucide.createIcons();
    } else {
        panel.classList.add('hidden');
    }
}

function resolveSpintax(text) {
    // Expand {A|B|C} patterns by picking a random option
    return text.replace(/\{([^{}]+)\}/g, (_, group) => {
        const opts = group.split('|');
        return opts[Math.floor(Math.random() * opts.length)];
    });
}

function useQuickReply(idx, content) {
    const input = document.getElementById(`chat-input-${idx}`);
    if (input) { input.value = resolveSpintax(content); input.focus(); }
    document.getElementById(`qr-panel-${idx}`)?.classList.add('hidden');
}

// ---- CRM: Dialog Tags ----
let chatTagsCache = null;

async function fetchChatTags() {
    if (chatTagsCache) return chatTagsCache;
    const r = await fetch('/api/chat-tags');
    chatTagsCache = await r.json();
    return chatTagsCache;
}

async function openTagsPanel(accountId, peerId, btn) {
    const panelId = `tags-panel-${accountId}-${peerId}`.replace(/[^a-z0-9\-_]/gi, '_');
    let panel = document.getElementById(panelId);
    if (panel) { panel.remove(); chatTagsCache = null; return; }

    const [allTags, dialogResp] = await Promise.all([
        fetchChatTags(),
        fetch(`/api/dialog-tags?account_id=${encodeURIComponent(accountId)}&peer_id=${encodeURIComponent(peerId)}`).then(r => r.json()),
    ]);
    const activeTags = new Set(dialogResp.map(dt => dt.tag_id));
    panel = document.createElement('div');
    panel.id = panelId;
    panel.className = 'absolute z-50 rounded-xl border shadow-xl p-3 min-w-[180px]';
    panel.style.cssText = 'background:var(--panel-card);border-color:var(--panel-border);top:100%;left:0;margin-top:4px;';

    const esc = s => String(s || '').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    if (!allTags.length) {
        panel.innerHTML = `<p class="text-xs" style="color:var(--panel-muted)">Нет тегов. <a href="/admin/settings" class="underline" style="color:var(--panel-accent)">Создать в настройках</a></p>`;
    } else {
        panel.innerHTML = `
            <p class="text-xs font-semibold mb-2" style="color:var(--panel-muted);">Теги диалога</p>
            <div class="space-y-1">
            ${allTags.map(t => `
                <label class="flex items-center gap-2 cursor-pointer text-xs hover:bg-white/5 rounded px-1 py-0.5 transition-colors" style="color:var(--panel-text);">
                    <input type="checkbox" class="tag-cb" data-tag-id="${t.id}" data-account="${esc(accountId)}" data-peer="${esc(peerId)}" ${activeTags.has(t.id) ? 'checked' : ''}>
                    <span class="inline-block w-2 h-2 rounded-full flex-shrink-0" style="background:${esc(t.color)};"></span>
                    ${esc(t.name)}
                </label>
            `).join('')}
            </div>
            <div class="mt-2 pt-2 border-t" style="border-color:var(--panel-border);">
                <input type="text" id="${panelId}-new" placeholder="Новый тег..." class="w-full text-xs px-2 py-1 rounded border" style="background:var(--panel-surface);border-color:var(--panel-border);color:var(--panel-text);">
                <button onclick="createAndAddTag('${esc(accountId)}','${esc(peerId)}','${panelId}')" class="mt-1 w-full text-xs py-1 rounded" style="background:var(--panel-accent);color:#fff;">+ Добавить</button>
            </div>`;
        panel.querySelectorAll('.tag-cb').forEach(cb => {
            cb.addEventListener('change', async () => {
                const tagId = parseInt(cb.dataset.tagId);
                const accId = cb.dataset.account;
                const pId = cb.dataset.peer;
                if (cb.checked) {
                    await fetch('/api/dialog-tags', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({account_id:accId,peer_id:pId,tag_id:tagId})});
                } else {
                    const list = await fetch(`/api/dialog-tags?account_id=${encodeURIComponent(accId)}&peer_id=${encodeURIComponent(pId)}`).then(r=>r.json());
                    const dt = list.find(d => d.tag_id === tagId);
                    if (dt) await fetch(`/api/dialog-tags/${dt.id}`, {method:'DELETE'});
                }
                renderDialogTags(accId, pId);
            });
        });
    }

    btn.parentElement.style.position = 'relative';
    btn.parentElement.appendChild(panel);
    document.addEventListener('click', function closePanel(e) {
        if (!panel.contains(e.target) && e.target !== btn) { panel.remove(); document.removeEventListener('click', closePanel); }
    });
}

async function createAndAddTag(accountId, peerId, panelId) {
    const input = document.getElementById(`${panelId}-new`);
    const name = (input?.value || '').trim();
    if (!name) return;
    chatTagsCache = null;
    const r = await fetch('/api/chat-tags', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
    const d = await r.json();
    if (d.success) {
        await fetch('/api/dialog-tags', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({account_id:accountId,peer_id:peerId,tag_id:d.id})});
        document.getElementById(panelId)?.remove();
        renderDialogTags(accountId, peerId);
    } else {
        alert(d.error || 'Ошибка');
    }
}

async function renderDialogTags(accountId, peerId) {
    const containerId = `dialog-tags-${accountId}-${peerId}`.replace(/[^a-z0-9\-_]/gi, '_');
    const container = document.getElementById(containerId);
    if (!container) return;
    const list = await fetch(`/api/dialog-tags?account_id=${encodeURIComponent(accountId)}&peer_id=${encodeURIComponent(peerId)}`).then(r=>r.json());
    container.innerHTML = list.map(t => `<span class="inline-flex items-center gap-1 text-xs px-1.5 py-0.5 rounded-full" style="background:${t.color}22;color:${t.color};">${t.name}</span>`).join('');
}
</script>
